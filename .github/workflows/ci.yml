name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-django ruff

      - name: Download Vosk model
        run: |
          python - <<'PY'
          import os, zipfile, urllib.request

          url = "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip"
          zip_path = "vosk-model.zip"
          models_dir = "models"

          os.makedirs(models_dir, exist_ok=True)

          print("Downloading model...")
          urllib.request.urlretrieve(url, zip_path)

          print("Unzipping model...")
          with zipfile.ZipFile(zip_path, "r") as z:
              z.extractall(models_dir)

          print("Done. Models folder contains:", os.listdir(models_dir))
          PY

      - name: Run linter (ruff)
        run: |
          ruff check .

      - name: Run tests
        run: |
          cd Room_booking_serve
          export DJANGO_SETTINGS_MODULE=meeting_room_booking.settings
          pytest
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/sprint4' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to DigitalOcean server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/lensi-comp490-project1
            git pull origin sprint4
            cd Room_booking_serve
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate
            pkill -f "manage.py runserver" || true
            nohup python manage.py runserver 0.0.0.0:8000 > server.log 2>&1 &